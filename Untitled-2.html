<html>
<head>
    <title>box page2</title>
    <style>
        body {  
            display: flex; 
            justify-content: center;
            height: 80vh;
        }
        .
        
        .box2{
            height: 200px;
            width: 200px;
            ALIGN-ITEMS: center;
            border:2px solid rgb(157, 8, 8);
            border-radius: 100%;
        }
        img{
            width: 100%;
            height: 100%;
            border-radius: 100%;
            object-fit: cover  ;
        }.box3{
            height: 400px;
            width: 400px;
            border:2px solid green;
            border-radius: 100%;
        }
        img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 100%;
        }
        .new{
            display: flex;
            gap: 30px;
        }
        .spinner{
            
            border: 6px solid grey;
            border-radius: 100%;
            width: 50px;
            height: 50px;
            border-top: 6px solid rgb(0, 255, 13);
            animation: spin 0.3s linear infinite;
        }
        @keyframes spin{
            0%{
                transform: rotate(0deg);   
            }
            100%{
                transform: rotate(360deg);
            }
        }
    </style>

</head>

<body>
